# HTTP configuration
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200

# Database Configuration (PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=admin
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/nanophotosense

# Flyway Configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration
quarkus.flyway.clean-at-start=false
quarkus.flyway.clean-disabled=true

# Optional profile for intentionally resetting local DB during development.
%dev-reset.quarkus.flyway.clean-at-start=true
%dev-reset.quarkus.flyway.clean-disabled=false

# Optional profile for running local development with H2.
# Usage: ./mvnw quarkus:dev -Dquarkus.profile=dev-h2
%dev-h2.quarkus.datasource.db-kind=h2
%dev-h2.quarkus.datasource.username=sa
%dev-h2.quarkus.datasource.password=sa
%dev-h2.quarkus.datasource.jdbc.url=jdbc:h2:mem:nanophotosense;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
%dev-h2.quarkus.flyway.locations=db/migration-h2
%dev-h2.quarkus.flyway.clean-at-start=false
%dev-h2.quarkus.flyway.clean-disabled=true
%dev-h2.quarkus.devservices.enabled=false

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=true

# Disable Dev Services (no Docker)
quarkus.devservices.enabled=false

# REST Client - Physics API
quarkus.rest-client.physics-api.url=http://localhost:8001
quarkus.rest-client.physics-api.read-timeout=0

# Sensor Configuration
spectral.sensor.ids=LSPR-01,LSPR-02,LSPR-03

# Landslide Risk Model (soil moisture infiltration)
landslide.risk.delta-moderate=0.010
landslide.risk.delta-critical=0.018
landslide.risk.rate-critical=0.000015
landslide.alert.threshold=80
landslide.alert.critical-threshold=95

# Health Check
quarkus.smallrye-health.ui.always-include=true

